name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: pg-retest-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: pg-retest-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: pg-retest-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: pg-retest-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install C/bindgen build deps for pg_query (Linux)
        # pg_query's build.rs uses bindgen, which needs clang + its libclang
        # headers. Required for both amd64 and arm64 Linux targets.
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz pg-retest
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pg-retest-linux-amd64/pg-retest-linux-amd64.tar.gz
            pg-retest-linux-arm64/pg-retest-linux-arm64.tar.gz
            pg-retest-macos-amd64/pg-retest-macos-amd64.tar.gz
            pg-retest-macos-arm64/pg-retest-macos-arm64.tar.gz
          generate_release_notes: true
